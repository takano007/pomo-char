<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぽもタイマー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <div id="timer-page">
        <div class="timer-container">
            <div id="timer-display">25:00</div>
            
            <div class="start-button-area">
                <button id="btn-start">スタート</button>
            </div>
            
            <div id="character-container">
                <div id="speech-bubble"></div>
                <div id="character">
                    <img id="char-img" src="images/idle1.png" alt="キャラクター">
                </div>
            </div>

            <div class="bottom-buttons-row">
                <button id="btn-stop">終了</button>
                <button id="btn-to-calendar" class="nav-btn">カレンダーへ</button>
            </div>
        </div>
    </div>

    <div id="calendar-page">
        <div class="calendar-header">
            <button id="btn-prev-month">＜ 前月</button>
            <h2 id="calendar-title">2026年 6月</h2>
            <button id="btn-next-month">翌月 ＞</button>
        </div>
        
        <div id="calendar-grid"></div>
        
        <div class="calendar-bottom-layout" style="display: flex; width: 100%; max-width: 320px; margin: 25px auto 0 auto; align-items: flex-end; position: relative; box-sizing: border-box; padding: 0;">
                
            <div class="bottom-left-zone" style="width: 50%; display: flex; flex-direction: column; align-items: flex-start; box-sizing: border-box; padding-right: 5px;">
                <div id="total-study-time">この月の合計：0分</div>
                <button id="btn-to-timer" class="bottom-return-btn">タイマーへ戻る</button>
            </div>

            <div id="calendar-char-container" style="position: absolute; bottom: 0; right: 0; width: 50%; display: flex; justify-content: center; align-items: center; gap: 6px; z-index: 100; cursor: move; box-sizing: border-box; padding-left: 5px;">
                <img id="calendar-char-img" src="images/walk1.png" alt="キャラクター" style="width: 65px; height: 65px; object-fit: contain; user-select: none; -webkit-user-drag: none; flex-shrink: 0;">
                
                <div id="calendar-speech-bubble">
                    -
                    <div style="position: absolute; right: -7px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-style: solid; border-width: 6px 0 6px 7px; border-color: transparent transparent transparent #3182ce;"></div>
                    <div style="position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-style: solid; border-width: 5px 0 5px 6px; border-color: transparent transparent transparent #fff;"></div>
                </div>
                
            </div>

        </div>

        <!-- ユーザーID引継ぎ機能 -->
        <div class="transfer-section" style="margin-top: 40px; text-align: center; width: 100%;">
            <p id="trigger-id-display" style="font-size: 11px; color: #a0aec0; cursor: pointer; text-decoration: underline; margin: 0; padding: 10px 0;">
                ユーザーID: <span id="current-user-id-text">-</span>
            </p>

            <div id="transfer-input-area" style="display: none; margin-top: 15px; padding: 15px; border: 1px dashed #cbd5e0; border-radius: 8px; background: #f7fafc; box-sizing: border-box;">
                <p style="margin: 0 0 10px 0; font-size: 12px; font-weight: bold; color: #4a5568;">📱 データの引き継ぎ</p>
                <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                    <input type="text" id="input-new-user-id" placeholder="引き継ぎたいIDを入力" style="padding: 8px; font-size: 13px; border: 1px solid #cbd5e0; border-radius: 6px; flex: 1; max-width: 200px; box-sizing: border-box;">
                    <button id="btn-do-transfer" style="padding: 8px 12px; font-size: 13px; font-weight: bold; background: #3182ce; color: white; border: none; border-radius: 6px; cursor: pointer;">user_id引継ぎ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
