<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロ・タイマー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="timer-page">
        <div class="timer-container">
            <div id="timer-display">25:00</div>
            
            <div class="start-button-area">
                <button id="btn-start">スタート</button>
            </div>
            
            <div id="character-container">
                <div id="speech-bubble"></div>
                <div id="character">
                    <img id="char-img" src="images/idle1.png" alt="キャラクター">
                </div>
            </div>

            <div class="bottom-buttons-row">
                <button id="btn-stop">終了</button>
                <button id="btn-to-calendar" class="nav-btn">カレンダーへ</button>
            </div>
        </div>
    </div>

    <div id="calendar-page">
        <div class="calendar-header">
            <button id="btn-prev-month">＜ 前月</button>
            <h2 id="calendar-title">2026年 6月</h2>
            <button id="btn-next-month">翌月 ＞</button>
        </div>
        
        <div id="calendar-grid"></div>
        
        <div id="total-study-time">この月の合計：0分</div>

        <button id="btn-to-timer" class="bottom-return-btn">タイマーへ戻る</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
