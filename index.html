<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロ・タイマー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="timer-page">
        <div class="timer-container">
            <div id="timer-display">25:00</div>
            
            <div class="start-button-area">
                <button id="btn-start">スタート</button>
            </div>
            
            <div id="character-container">
                <div id="speech-bubble"></div>
                <div id="character">
                    <img id="char-img" src="images/idle1.png" alt="キャラクター">
                </div>
            </div>

            <div class="bottom-buttons-row">
                <button id="btn-stop">終了</button>
                <button id="btn-to-calendar" class="nav-btn">カレンダーへ</button>
            </div>
        </div>
    </div>

    <div id="calendar-page">
        <div class="calendar-header">
            <button id="btn-prev-month">＜ 前月</button>
            <h2 id="calendar-title">2026年 6月</h2>
            <button id="btn-next-month">翌月 ＞</button>
        </div>
        
        <div id="calendar-grid"></div>
        
        <div id="total-study-time">この月の合計：0分</div>

        <button id="btn-to-timer" class="bottom-return-btn">タイマーへ戻る</button>
    </div>

    <script src="script.js"></script>


<!-- 監視用 -->>
                <div id="debug-log" style="position: fixed; bottom: 0; left: 0; width: 100%; max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.8); color: #00ff00; font-family: monospace; font-size: 11px; z-index: 9999; padding: 5px; box-sizing: border-box; pointer-events: none;">
                    [Debug Monitor] アプリ起動完了
                </div>

                <script>
                    // 画面のモニターに文字を出す関数
                    window.logToScreen = function(msg) {
                        const el = document.getElementById('debug-log');
                        if (el) {
                            el.innerHTML += '<br>▶ ' + msg;
                            el.scrollTop = el.scrollHeight; // 常に最新を表示
                        }
                    };
                    // 万が一エラーが起きたらここに強制表示する
                    window.onerror = function(message, source, lineno, colno, error) {
                        window.logToScreen('❌エラー発生: ' + message + ' (' + lineno + '行目)');
                        return false;
                    };
                </script>
</body>
</html>
